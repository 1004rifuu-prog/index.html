<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>JUGGLER風オリジナル完成版 (スマホ対応・修正版)</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Sans","Yu Gothic",sans-serif;background:radial-gradient(circle at top,#3a0d62 0%,#19061f 48%,#050108 100%);color:#fff;min-height:100vh;padding:14px;overscroll-behavior-y:none}
button{touch-action:manipulation}
.app{width:min(1120px,100%);margin:0 auto;background:linear-gradient(180deg,#111,#050505);border:4px solid #b88b31;border-radius:18px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55);position:relative;transition:filter .22s ease}.app.blackout{filter:brightness(.18) saturate(.55)}
.dashboard{background:linear-gradient(180deg,#16355f,#071624 65%,#05080d);border-bottom:3px solid #3e3e3e;padding:10px;display:grid;grid-template-columns:1.7fr .9fr;gap:10px}.panel{background:linear-gradient(180deg,rgba(38,83,137,.95),rgba(7,24,42,.95));border:2px solid #77a8d5;border-radius:10px;box-shadow:inset 0 0 16px rgba(255,255,255,.05)}
.graph-panel{padding:8px;display:grid;grid-template-rows:auto 1fr auto;gap:8px;min-height:250px}.graph-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.graph-title{display:inline-block;padding:4px 12px;border-radius:6px;background:linear-gradient(180deg,#2d6cb0,#0d2b54);border:1px solid #90caf7;font-weight:900;color:#eef8ff;letter-spacing:.05em}.graph-meta{font-size:12px;color:#d7ebff;opacity:.95}.graph-canvas-wrap{border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.14);background:radial-gradient(circle at center,rgba(95,160,255,.08),transparent 45%),linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.28)),repeating-linear-gradient(to top,rgba(255,255,255,.06) 0 1px,transparent 1px 42px),repeating-linear-gradient(to right,rgba(255,255,255,.05) 0 1px,transparent 1px 50px)}#graphCanvas{width:100%;height:176px;display:block}
.recent-hits{display:grid;grid-template-columns:repeat(10,1fr);gap:4px}.recent-hit{min-height:38px;border-radius:6px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;font-size:12px;font-weight:900;color:#fff8c6;text-align:center;line-height:1.1;padding:4px 2px}.recent-hit small{display:block;font-size:10px;color:#c5e7ff;font-weight:700}
.stats-panel{padding:8px;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:minmax(58px,auto);gap:8px}.stat-card{border-radius:10px;background:linear-gradient(180deg,rgba(17,89,162,.95),rgba(7,36,74,.95));border:1px solid rgba(167,214,255,.55);padding:8px 10px;box-shadow:inset 0 0 10px rgba(255,255,255,.05)}.stat-card h4{margin:0 0 4px;font-size:12px;color:#ffe580;letter-spacing:.04em}.stat-card .big{font-size:22px;font-weight:900;color:#fff6b0;line-height:1.05}.stat-card .sub{font-size:11px;color:#d7eeff}.stat-card.wide{grid-column:span 2}
.game-circle{grid-column:span 2;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;background:linear-gradient(180deg,#bd78c8,#733e90 55%,#4b215e);border:2px solid #f7c7ff}.game-circle .label{font-size:13px;font-weight:900;color:#fff4b4}.game-circle .big-round{width:98px;height:98px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe9a3 0%,#ffdd5d 18%,#f69f2d 48%,#8d3089 100%);border:3px solid rgba(255,255,255,.55);display:grid;place-items:center;color:#fff;font-weight:900;text-shadow:0 2px 3px rgba(0,0,0,.45);box-shadow:0 8px 18px rgba(0,0,0,.35),inset 0 4px 8px rgba(255,255,255,.35);text-align:center;line-height:1.05}.game-circle .big-round span{display:block;font-size:13px}.game-circle .big-round strong{display:block;font-size:36px}
.cabinet{background:linear-gradient(180deg,#180b09 0%,#050505 30%,#0d0b09 100%);padding:12px 14px 16px;position:relative}.cabinet:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 20%,transparent 80%,rgba(255,255,255,.02));pointer-events:none}
.jackpot-banner{margin:0 auto 8px;width:fit-content;display:flex;gap:12px;align-items:center;justify-content:center}.banner-seven{min-width:120px;height:56px;border-radius:10px;background:linear-gradient(180deg,#fff5d3,#f0cab4 40%,#ffcdc7);border:2px solid #cda44d;display:grid;place-items:center;color:#df2121;font-size:48px;font-weight:900;text-shadow:0 2px 0 #fff,0 0 5px rgba(255,255,255,.45);box-shadow:inset 0 0 6px rgba(255,255,255,.45),0 8px 14px rgba(0,0,0,.28);font-style:italic;transform:skewX(-8deg)}.juggler-title{text-align:center;font-size:clamp(26px,4vw,42px);font-weight:900;letter-spacing:.08em;color:#fff;text-shadow:0 0 6px rgba(255,255,255,.55),0 0 14px rgba(123,145,255,.18);margin:6px 0 12px}
.machine-core{display:grid;grid-template-columns:70px 1fr 74px;gap:10px;align-items:stretch}.side-lamps{display:flex;flex-direction:column;justify-content:center;gap:10px;align-items:center}.count-lamp{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,.42);display:grid;place-items:center;font-weight:900;background:radial-gradient(circle at 35% 30%,#fff5b0 0%,#ffca29 48%,#b47700 100%);color:#6f4500;box-shadow:inset 0 3px 6px rgba(255,255,255,.35),0 5px 12px rgba(0,0,0,.3)}.side-art{display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:6px 0;color:#e6c27f;font-size:12px;font-weight:900;opacity:.92}
.reel-box{background:linear-gradient(180deg,#3a241a,#0c0705 40%,#140b09);border:3px solid #a85f2c;border-radius:16px;padding:10px 12px 12px;box-shadow:inset 0 0 14px rgba(255,255,255,.04),0 10px 22px rgba(0,0,0,.35)}.reel-info-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap;font-size:12px;font-weight:900;color:#ffd76b}
.reel-view{position:relative;background:linear-gradient(180deg,#f2f2f2,#d8d8d8 12%,#101010 12%,#020202 88%,#dddddd 88%,#fafafa);border:4px solid #eaeaea;border-radius:20px;padding:14px 12px;box-shadow:inset 0 0 20px rgba(0,0,0,.48)}.payline{position:absolute;left:14px;right:14px;top:50%;transform:translateY(-50%);height:5px;border-radius:999px;background:linear-gradient(90deg,transparent,#ff5555,#ffe76f,#ff5555,transparent);box-shadow:0 0 12px rgba(255,112,112,.9);z-index:5;pointer-events:none}
.reels{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.reel-window{height:240px;position:relative;overflow:hidden;border-radius:14px;border:3px solid #8c8c8c;background:linear-gradient(180deg,#202020,#000);box-shadow:inset 0 0 14px rgba(0,0,0,.82)}.reel-window:before,.reel-window:after{content:"";position:absolute;left:0;width:100%;height:32px;z-index:3;pointer-events:none}.reel-window:before{top:0;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(0,0,0,0))}.reel-window:after{bottom:0;background:linear-gradient(0deg,rgba(255,255,255,.14),rgba(0,0,0,0))}.reel-strip{position:absolute;left:0;top:0;width:100%;will-change:transform}.symbol{height:80px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:36px;color:#fff;text-shadow:0 2px 2px rgba(0,0,0,.72);border-bottom:1px solid rgba(255,255,255,.05);user-select:none}.symbol.seven{color:#ff5555;font-style:italic}.symbol.bar{color:#ffccdf;font-size:26px;letter-spacing:.08em}.symbol.grape{color:#be93ff}.symbol.cherry{color:#ff88a8}.symbol.bell{color:#ffe8a5}.symbol.pig{color:#ffb07e}.symbol.clown{color:#fff3b6}
.gogo-zone{display:flex;align-items:end;gap:10px;margin-top:10px;justify-content:space-between;flex-wrap:wrap}.gogo-lamp-wrap{display:flex;align-items:center;gap:10px}.gogo-lamp{width:94px;height:94px;border-radius:18px 18px 24px 24px;position:relative;background:linear-gradient(180deg,#1a2030,#07090d);border:3px solid rgba(113,170,255,.18);box-shadow:inset 0 0 18px rgba(0,0,0,.98);overflow:hidden}.gogo-lamp:before{content:"";position:absolute;inset:8px;clip-path:polygon(50% 0%,58% 12%,72% 4%,74% 19%,90% 11%,84% 28%,100% 31%,88% 43%,100% 50%,88% 57%,100% 69%,84% 72%,90% 89%,74% 81%,72% 96%,58% 88%,50% 100%,42% 88%,28% 96%,26% 81%,10% 89%,16% 72%,0% 69%,12% 57%,0% 50%,12% 43%,0% 31%,16% 28%,10% 11%,26% 19%,28% 4%,42% 12%);background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.02),rgba(120,180,255,.04) 30%,rgba(10,20,30,.96) 85%);transition:all .35s ease}.gogo-lamp:after{content:"GOGO!\A CHANCE";white-space:pre;position:absolute;inset:0;display:grid;place-items:center;text-align:center;line-height:1.05;font-weight:900;font-size:18px;color:rgba(255,255,255,.03);text-shadow:none;z-index:2}
.gogo-lamp.on:before{background:radial-gradient(circle at 40% 35%,#efffff 0%,#8ce8ff 18%,#22c8ff 44%,#004ef6 75%,#00103e 100%);filter:drop-shadow(0 0 10px #66dcff) drop-shadow(0 0 18px rgba(33,199,255,.7))}.gogo-lamp.on:after{color:#fff;text-shadow:0 0 8px #fff,0 0 16px #9ceeff}
.gogo-lamp.premium:before{background:radial-gradient(circle at 40% 35%,#fff7ff 0%,#ffc8ff 18%,#ff6cf1 42%,#7c28ff 72%,#18003d 100%)!important;filter:drop-shadow(0 0 12px #ff87f5) drop-shadow(0 0 24px rgba(208,83,255,.9))}.gogo-lamp.premium:after{color:#fff!important;text-shadow:0 0 8px #fff,0 0 16px #ffbcff!important}
.gogo-lamp.blink{animation:blinkLamp .18s linear infinite}
.gogo-lamp.mellow{animation:mellowLamp 1.9s ease-in-out infinite}
.gogo-lamp.color-shift:before{
  background:radial-gradient(circle at 40% 35%,#efffff 0%,#8ce8ff 18%,#22c8ff 44%,#004ef6 75%,#00103e 100%);
  animation:premiumColorShift 1.3s linear infinite;
}
.gogo-lamp.color-shift:after{
  color:#fff!important;
  text-shadow:0 0 8px #fff,0 0 16px #9ceeff!important;
}
@keyframes blinkLamp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.97)}}
@keyframes mellowLamp{0%{opacity:.25;transform:scale(.96)}50%{opacity:1;transform:scale(1)}100%{opacity:.3;transform:scale(.97)}}
@keyframes premiumColorShift{
  0%{
    filter:hue-rotate(0deg) drop-shadow(0 0 10px #66dcff) drop-shadow(0 0 18px rgba(33,199,255,.7));
  }
  50%{
    filter:hue-rotate(120deg) drop-shadow(0 0 10px #ff77f3) drop-shadow(0 0 18px rgba(255,100,230,.8));
  }
  100%{
    filter:hue-rotate(240deg) drop-shadow(0 0 10px #ffe066) drop-shadow(0 0 18px rgba(255,220,80,.8));
  }
}
.seven-seg-row{display:grid;grid-template-columns:repeat(3,92px);gap:8px;justify-content:center;align-items:center}.seg{height:46px;border-radius:8px;background:linear-gradient(180deg,#1d0000,#3d0505 55%,#120000);border:2px solid #6e2727;display:grid;place-items:center;font-family:monospace;font-size:28px;font-weight:900;color:#ff4242;text-shadow:0 0 8px rgba(255,68,68,.65);box-shadow:inset 0 0 12px rgba(0,0,0,.55)}
.control-panel{margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center}.lever{width:62px;height:62px;border-radius:18px;background:linear-gradient(180deg,#444,#111);border:3px solid rgba(255,255,255,.18);display:grid;place-items:center;box-shadow:inset 0 0 8px rgba(255,255,255,.08),0 8px 16px rgba(0,0,0,.35)}.lever button{width:100%;height:100%;border:none;border-radius:14px;background:linear-gradient(180deg,#ffd24e,#ff8b14 55%,#a84a00);color:#4a2100;font-weight:900;cursor:pointer;box-shadow:inset 0 4px 8px rgba(255,255,255,.42),0 8px 16px rgba(0,0,0,.25)}
.center-buttons{display:flex;justify-content:center;align-items:center;gap:16px;flex-wrap:wrap}.stop-btn{width:88px;height:88px;border-radius:50%;border:4px solid rgba(255,255,255,.38);background:radial-gradient(circle at 35% 30%,#ffffff 0%,#d9d9d9 45%,#8f8f8f 78%,#5e5e5e 100%);color:#343434;font-weight:900;cursor:pointer;box-shadow:inset 0 4px 8px rgba(255,255,255,.55),0 10px 18px rgba(0,0,0,.3);transition:transform .1s ease,filter .1s ease,opacity .12s ease}.stop-btn:hover{transform:translateY(-1px);filter:brightness(1.04)}.stop-btn:active{transform:translateY(1px)}.stop-btn:disabled{opacity:.45;filter:grayscale(.35);cursor:not-allowed;transform:none}
.bet-button{width:72px;height:72px;border-radius:50%;border:4px solid rgba(255,255,255,.35);background:radial-gradient(circle at 35% 30%,#ffaaaa 0%,#ff4646 45%,#b10000 85%,#5f0000 100%);color:#fff;font-weight:900;box-shadow:inset 0 4px 8px rgba(255,255,255,.3),0 10px 18px rgba(0,0,0,.3)}.message{margin-top:14px;border-radius:12px;padding:12px 14px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);color:#fff0b6;min-height:52px;line-height:1.6;font-weight:700}.footer-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;flex-wrap:wrap}.mini-action{border:none;border-radius:10px;padding:9px 12px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(180deg,#555,#262626)}.mini-action.orange{background:linear-gradient(180deg,#ffb31f,#ff7f00)}.mini-action.pink{background:linear-gradient(180deg,#e45f7e,#b71c4f)}
@media (max-width:920px){.dashboard{grid-template-columns:1fr}.machine-core{grid-template-columns:1fr}.side-lamps,.side-art{flex-direction:row;justify-content:center}.control-panel{grid-template-columns:1fr;justify-items:center}.gogo-zone{justify-content:center}}
@media (max-width:640px){.recent-hits{grid-template-columns:repeat(5,1fr)}.stats-panel{grid-template-columns:1fr 1fr}.game-circle{grid-column:span 2}.banner-seven{min-width:86px;height:48px;font-size:40px}.reel-window{height:198px}.symbol{height:66px;font-size:30px}.symbol.bar{font-size:22px}.seven-seg-row{grid-template-columns:repeat(3,74px)}.seg{height:40px;font-size:24px}.stop-btn{width:74px;height:74px}}
</style>
</head>
<body>
<div id="app" class="app">
<section class="dashboard">
  <div class="panel graph-panel">
    <div class="graph-head"><div class="graph-title">日別グラフ</div><div id="graphMeta" class="graph-meta">通常時 / 1-99</div></div>
    <div class="graph-canvas-wrap"><canvas id="graphCanvas" width="720" height="176"></canvas></div>
    <div id="recentHits" class="recent-hits"></div>
  </div>
  <div class="panel stats-panel">
    <div class="stat-card"><h4>BB</h4><div id="bbCount" class="big">0</div><div class="sub">本日</div></div>
    <div class="stat-card"><h4>RB</h4><div id="rbCount" class="big">0</div><div class="sub">本日</div></div>
    <div class="stat-card wide"><h4>ジャグ連</h4><div id="streakText" class="big">0連</div><div id="zoneText" class="sub">待機なし</div></div>
    <div class="stat-card"><h4>BB確率</h4><div id="bbRate" class="big">--</div><div class="sub">分母</div></div>
    <div class="stat-card"><h4>RB確率</h4><div id="rbRate" class="big">--</div><div class="sub">分母</div></div>
    <div class="stat-card wide game-circle"><div><div class="label">ゲーム</div><div id="totalGameText" class="sub">累計 0G</div></div><div class="big-round"><span>今回</span><strong id="currentGames">0</strong></div></div>
  </div>
</section>

<section class="cabinet">
  <div class="jackpot-banner"><div class="banner-seven">7</div><div class="banner-seven">7</div><div class="banner-seven">7</div></div>
  <div class="juggler-title">JUGGLER</div>
  <div class="machine-core">
    <div class="side-lamps"><div class="count-lamp">3</div><div class="count-lamp">2</div><div class="count-lamp">1</div></div>
    <div class="reel-box">
      <div class="reel-info-row"><div>3BET固定</div><div id="modeText">通常抽選 1/99</div><div id="premiumText">プレミア 0回</div></div>

      <div class="reel-view">
        <div class="payline"></div>
        <div class="reels">
          <div class="reel-window"><div id="reel0" class="reel-strip"></div></div>
          <div class="reel-window"><div id="reel1" class="reel-strip"></div></div>
          <div class="reel-window"><div id="reel2" class="reel-strip"></div></div>
        </div>
      </div>

      <div class="gogo-zone">
        <div class="gogo-lamp-wrap">
          <div id="gogoLamp" class="gogo-lamp"></div>
          <div class="seven-seg-row">
            <div id="segCredit" class="seg">000</div>
            <div id="segPay" class="seg">000</div>
            <div id="segZone" class="seg">000</div>
          </div>
        </div>
      </div>

      <div class="control-panel">
        <div class="lever"><button id="spinBtn">START</button></div>
        <div class="center-buttons">
          <button id="stop0" class="stop-btn" disabled>STOP</button>
          <button id="stop1" class="stop-btn" disabled>STOP</button>
          <button id="stop2" class="stop-btn" disabled>STOP</button>
        </div>
        <button class="bet-button" disabled>BET</button>
      </div>

      <div id="message" class="message">中段チェリー内部当選演出・リール配列・プレミア演出分離を反映しました。</div>

      <div class="footer-actions">
        <button id="addCreditBtn" class="mini-action orange">クレジット+100</button>
        <button id="resetBtn" class="mini-action pink">リセット</button>
      </div>
    </div>
    <div class="side-art"><div>BONUS</div><div>CHANCE</div><div>PREMIUM</div></div>
  </div>
</section>
</div>

<script>
const STORAGE_KEY='juggler_complete_v5';
const BET=3,NORMAL_DENOM=99,JUGUREN_DENOM=8,JUGUREN_GAMES=10,PREMIUM_RATE=0.20;

const REELS=[
[
  'bell','seven','pig','grape','pig','grape','bar','cherry','grape','pig',
  'grape','seven','clown','grape','pig','grape','cherry','grape','grape','pig','grape'
],
[
  'pig','seven','grape','cherry','cherry','bell','grape','cherry','pig','bar',
  'grape','cherry','pig','bell','grape','cherry','pig','bar','grape','cherry','clown'
],
[
  'grape','seven','bar','bell','pig','grape','clown','bell','pig','grape',
  'clown','bell','pig','grape','clown','bell','pig','grape','clown','bell','pig'
]
];

const S={
  seven:{k:'seven',t:'7'},
  bar:{k:'bar',t:'BAR'},
  grape:{k:'grape',t:'🍇'},
  cherry:{k:'cherry',t:'🍒'},
  bell:{k:'bell',t:'🔔'},
  pig:{k:'pig',t:'🐗'},
  clown:{k:'clown',t:'🤡'}
};

const BONUS_PATTERNS=[
  {name:'777',type:'BIG',line:['seven','seven','seven'],payout:120},
  {name:'77BAR',type:'REG',line:['seven','seven','bar'],payout:60}
];

const PREMIUM_TYPES=['blackout','blink','delay','mellow','colorShift'];
const LAMP_TIMINGS=['lever','start','after1','after2','after3'];

// 中段チェリー内部当選演出専用停止位置
// 左: 中段チェリー / 中右: 上段BARが揃う形
const MID_CHERRY_STOPS = {
  0: [7],
  1: [10,18],
  2: [3]
};

const app=document.getElementById('app');
const canvas=document.getElementById('graphCanvas');
const ctx=canvas.getContext('2d');
const recentHitsEl=document.getElementById('recentHits');
const graphMetaEl=document.getElementById('graphMeta');
const bbCountEl=document.getElementById('bbCount');
const rbCountEl=document.getElementById('rbCount');
const streakTextEl=document.getElementById('streakText');
const zoneTextEl=document.getElementById('zoneText');
const bbRateEl=document.getElementById('bbRate');
const rbRateEl=document.getElementById('rbRate');
const currentGamesEl=document.getElementById('currentGames');
const totalGameTextEl=document.getElementById('totalGameText');
const modeTextEl=document.getElementById('modeText');
const premiumTextEl=document.getElementById('premiumText');
const segCreditEl=document.getElementById('segCredit');
const segPayEl=document.getElementById('segPay');
const segZoneEl=document.getElementById('segZone');
const gogoLamp=document.getElementById('gogoLamp');
const messageEl=document.getElementById('message');
const spinBtn=document.getElementById('spinBtn');

const stopBtns=[
  document.getElementById('stop0'),
  document.getElementById('stop1'),
  document.getElementById('stop2')
];
const reelEls=[
  document.getElementById('reel0'),
  document.getElementById('reel1'),
  document.getElementById('reel2')
];

let state=loadState();
let reels=reelEls.map((el,i)=>({
  el,i,offset:0,raf:null,spinning:false,stopped:false,speed:22+i*1.5,centerIndex:0,targetIndex:0
}));
let round=null,inSpin=false,lit=false;

let stopOrder = [];
let reversePushFlags = { active: false, isBonus: false, grapeLine: 'diag' };

function loadState(){
  const d={
    credits:300,
    currentGames:0,
    totalGames:0,
    totalHits:0,
    bb:0,
    rb:0,
    streak:0,
    zoneLeft:0,
    premiumCount:0,
    lastPayout:0,
    coinDiff:0,
    replayStock:0,
    history:[],
    graph:[0],
    bonusActive:false,
    bonusPattern:null,
    bonusPremium:false,
    bonusPremiumType:null
  };
  try{
    return {...d,...(JSON.parse(localStorage.getItem(STORAGE_KEY))||{})};
  }catch{
    return d;
  }
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function h(){return window.innerWidth<=640?66:80}
function cyc(i){return REELS[i].length*h()}
function fmt3(n){return String(Math.max(0,n)).padStart(3,'0')}
function rate(cnt){return cnt>0?`1/${Math.max(1,Math.floor(state.totalGames/cnt))}`:'--'}
function setMsg(t){messageEl.innerHTML=t}

function lamp(mode='off'){
  gogoLamp.classList.remove('on','premium','blink','mellow','color-shift');

  if(mode==='blue') gogoLamp.classList.add('on');
  if(mode==='premium') gogoLamp.classList.add('on','premium');
  if(mode==='blue-blink') gogoLamp.classList.add('on','blink');
  if(mode==='premium-mellow') gogoLamp.classList.add('on','premium','mellow');
  if(mode==='color-shift') gogoLamp.classList.add('on','color-shift');

  lit=mode!=='off';
}

function getPremiumLampMode(type){
  if(type==='blink') return 'blue-blink';
  if(type==='mellow') return 'premium-mellow';
  if(type==='colorShift') return 'color-shift';
  return 'premium';
}

function buildStrip(arr,repeat=4){
  let x='';
  for(let r=0;r<repeat;r++){
    for(const k of arr){
      x+=`<div class="symbol ${S[k].k}">${S[k].t}</div>`;
    }
  }
  return x;
}

function initReels(){
  reels.forEach((r,i)=>{
    r.el.innerHTML=buildStrip(REELS[i]);
    r.offset=-(REELS[i].length*h()+i*h()*1.7);
    r.el.style.transform=`translateY(${r.offset}px)`;
    r.spinning=false;
    r.stopped=false;
    r.centerIndex=0;
  });
}

function updateUI(){
  bbCountEl.textContent=state.bb;
  rbCountEl.textContent=state.rb;
  streakTextEl.textContent=`${state.streak}連`;
  zoneTextEl.textContent=state.zoneLeft>0?`残り ${state.zoneLeft}G / 1-${JUGUREN_DENOM}`:(state.streak>0?`${state.streak}連終了後待機`:'待機なし');
  bbRateEl.textContent=rate(state.bb);
  rbRateEl.textContent=rate(state.rb);
  currentGamesEl.textContent=state.currentGames;
  totalGameTextEl.textContent=`累計 ${state.totalGames}G`;
  graphMetaEl.textContent=state.zoneLeft>0?`ジャグ連 / 1-${JUGUREN_DENOM}`:`通常時 / 1-${NORMAL_DENOM}`;
  modeTextEl.textContent=state.zoneLeft>0?`ジャグ連抽選 1/${JUGUREN_DENOM}`:`通常抽選 1/${NORMAL_DENOM}`;
  premiumTextEl.textContent=`プレミア ${state.premiumCount}回`;
  segCreditEl.textContent=fmt3(state.credits);
  segPayEl.textContent=fmt3(state.lastPayout);
  segZoneEl.textContent=fmt3(state.zoneLeft||state.replayStock);
  renderRecent();
  drawGraph();
  saveState();
}

function renderRecent(){
  recentHitsEl.innerHTML='';
  const arr=state.history.slice(0,10);
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='recent-hit';
    if(arr[i]) d.innerHTML=`${arr[i].type}${arr[i].premium?'★':''}<small>${arr[i].game}G</small>`;
    else d.innerHTML=`--<small>${i+1}回前</small>`;
    recentHitsEl.appendChild(d);
  }
}

function drawGraph(){
  const w=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,w,H);
  const data=state.graph.slice(-36);
  if(data.length<2){
    ctx.fillStyle='rgba(255,255,255,.32)';
    ctx.font='bold 18px sans-serif';
    ctx.fillText('回転を始めるとここにグラフを表示します',36,98);
    return;
  }
  const max=Math.max(...data,20),min=Math.min(...data,-20),range=Math.max(1,max-min),step=w/(data.length-1);
  const zero=H-((0-min)/range)*(H-20)-10;
  ctx.beginPath();
  ctx.moveTo(0,zero); ctx.lineTo(w,zero);
  ctx.strokeStyle='rgba(255,230,130,.35)';
  ctx.lineWidth=1;
  ctx.stroke();

  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=i*step;
    const y=H-((v-min)/range)*(H-20)-10;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.lineWidth=3;
  ctx.strokeStyle='#ff6b6b';
  ctx.stroke();

  data.forEach((v,i)=>{
    const x=i*step;
    const y=H-((v-min)/range)*(H-20)-10;
    ctx.beginPath();
    ctx.arc(x,y,2.8,0,Math.PI*2);
    ctx.fillStyle='#ffe37d';
    ctx.fill();
  });
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function denomNow(){return state.zoneLeft>0?JUGUREN_DENOM:NORMAL_DENOM}

function chooseRound(){
  const isCherry = Math.floor(Math.random() * 20) === 0;
  if (isCherry) {
    const isHit = Math.random() < 0.02;
    if (isHit) {
      const bp = pick(BONUS_PATTERNS);
      const premium = (bp.type==='BIG' && Math.random()<PREMIUM_RATE);
      return {
        bonus:true,
        premium,
        premiumType:premium?pick(PREMIUM_TYPES):null,
        lampTiming:'after3',
        bonusPattern:bp,
        isMidCherry:false,
        isConsecutiveCherry:true,
        grape:false,
        bell:false
      };
    } else {
      return {
        bonus:false,
        premium:false,
        premiumType:null,
        lampTiming:null,
        bonusPattern:null,
        isMidCherry:false,
        isConsecutiveCherry:true,
        grape:false,
        bell:false
      };
    }
  }

  const hit=Math.floor(Math.random()*denomNow())===0;
  if(hit){
    const bp=pick(BONUS_PATTERNS);
    const premium=(bp.type==='BIG' && Math.random()<PREMIUM_RATE);
    return {
      bonus:true,
      premium,
      premiumType:premium?pick(PREMIUM_TYPES):null,
      lampTiming:premium?'lever':pick(LAMP_TIMINGS),
      bonusPattern:bp,
      isMidCherry:Math.random()<0.25, // 中段チェリーは内部当選時の演出の一つ
      isConsecutiveCherry:false,
      grape:false,
      bell:false
    };
  }

  if (Math.floor(Math.random() * 1000) === 0) {
    return {
      bonus:false,
      premium:false,
      premiumType:null,
      lampTiming:null,
      bonusPattern:null,
      isMidCherry:false,
      isConsecutiveCherry:false,
      grape:false,
      bell:true
    };
  }

  if (Math.random() < (1 / 6.3)) {
    return {
      bonus:false,
      premium:false,
      premiumType:null,
      lampTiming:null,
      bonusPattern:null,
      isMidCherry:false,
      isConsecutiveCherry:false,
      grape:true,
      bell:false
    };
  }

  return {
    bonus:false,
    premium:false,
    premiumType:null,
    lampTiming:null,
    bonusPattern:null,
    isMidCherry:false,
    isConsecutiveCherry:false,
    grape:false,
    bell:false
  };
}

async function premiumPrelude(){
  if(!round.premium)return;

  if(round.premiumType==='blackout'){
    app.classList.add('blackout');
    setMsg('★ プレミア：パネル全消灯 ★');
    await sleep(360);
    app.classList.remove('blackout');
    await sleep(180);
    app.classList.add('blackout');
    await sleep(240);
    app.classList.remove('blackout');

  }else if(round.premiumType==='blink'){
    lamp('blue-blink');
    setMsg('★ プレミア：青点滅 ★');
    await sleep(760);

  }else if(round.premiumType==='delay'){
    setMsg('★ プレミア：遅れ始動 ★');
    await sleep(520);

  }else if(round.premiumType==='mellow'){
    lamp('premium-mellow');
    setMsg('★ 新プレミア：じんわり点灯 ★');
    await sleep(1100);

  }else if(round.premiumType==='colorShift'){
    lamp('color-shift');
    setMsg('★ プレミア：色変化 ★');
    await sleep(900);
  }
}

function startReel(i,delay=0){
  const r=reels[i];
  setTimeout(()=>{
    r.spinning=true;
    r.stopped=false;
    const loop=()=>{
      if(!r.spinning)return;
      r.offset+=r.speed;
      if(r.offset>-h()) r.offset-=cyc(i);
      r.el.style.transform=`translateY(${r.offset}px)`;
      r.raf=requestAnimationFrame(loop);
    };
    r.raf=requestAnimationFrame(loop);
  },delay);
}

function startAll(){
  const d=round&&round.premium&&round.premiumType==='delay'?520:0;
  reels.forEach((r,i)=>startReel(i,d+i*120));

  if(round && round.bonus && !round.bonusReady && !round.premium && round.lampTiming==='start') {
    setTimeout(()=>{
      lamp('blue');
      setMsg("GOGO!点灯。ボーナス内部当選しました！次ゲームでボーナスが揃います。");
    }, 220);
  }
}

function visibleCenterIndex(i){
  const r=reels[i],hh=h(),centerPx=(window.innerWidth<=640?99:120)-r.offset;
  const raw=Math.round(centerPx/hh);
  return ((raw%REELS[i].length)+REELS[i].length)%REELS[i].length;
}

function nextIndexForSymbol(i,sym){
  const arr=REELS[i],now=visibleCenterIndex(i);
  for(let step=0;step<arr.length;step++){
    const idx=(now+step)%arr.length;
    if(arr[idx]===sym) return idx;
  }
  return now;
}

function snapToIndex(i,idx){
  const r=reels[i];
  r.centerIndex=idx;
  r.offset=-(cyc(i)+idx*h()-h());
  r.el.style.transform=`translateY(${r.offset}px)`;
}

function stopReel(i){
  if(!inSpin)return;
  const r=reels[i];
  if(r.stopped||!r.spinning)return;

  r.spinning=false;
  if(r.raf)cancelAnimationFrame(r.raf);

  if(!stopOrder.includes(i)){
    stopOrder.push(i);
  }

  let idx = visibleCenterIndex(i);

  if(round.bonusReady){
    idx=nextIndexForSymbol(i,round.bonusPattern.line[i]);

  } else if ((round && round.bonus) || state.bonusActive) {
    if (round && round.bonus && round.isMidCherry) {
      const candidates = MID_CHERRY_STOPS[i];
      idx = candidates.reduce((prev, curr) =>
        Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev
      );
    } else {
      let minSlide = 99;

      ['seven', 'bar'].forEach(sym => {
        for (let s = 0; s <= 4; s++) {
          if (REELS[i][(idx + s) % REELS[i].length] === sym) {
            if (s < minSlide) minSlide = s;
          }
        }
      });

      if (minSlide <= 4) {
        idx = (idx + minSlide) % REELS[i].length;
      } else {
        if(i===0 || i===1){
          while(
            REELS[i][idx]==='cherry' ||
            REELS[i][(idx-1+REELS[i].length)%REELS[i].length]==='cherry' ||
            REELS[i][(idx+1)%REELS[i].length]==='cherry'
          ) {
            idx = (idx + 1) % REELS[i].length;
          }
        }
        while(REELS[i][idx]==='seven' || REELS[i][idx]==='bar'){
          idx = (idx + 1) % REELS[i].length;
        }
      }

      if (stopOrder.length === 1 && stopOrder[0] === 2) {
        reversePushFlags.active = true;
        reversePushFlags.isBonus = true;
      }
    }

  } else if (round.bell) {
    if (i === 0) idx = 0;
    if (i === 1) {
      const valid = [5, 13];
      idx = valid.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
    }
    if (i === 2) {
      const valid = [3, 7, 11, 15, 19];
      idx = valid.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
    }

  } else if (round.grape) {
    if (stopOrder.length === 1 && stopOrder[0] === 2) {
      idx = 1;
      reversePushFlags.active = true;
      reversePushFlags.isBonus = false;
      reversePushFlags.grapeLine = Math.random() < 0.5 ? 'top' : 'diag';
    }

    if (reversePushFlags.active) {
      if (i === 1) {
        let validIdxs = [];
        if (reversePushFlags.grapeLine === 'top') {
          validIdxs = [3, 7, 11, 15, 19];
        } else {
          validIdxs = [2, 6, 10, 14, 18];
        }
        idx = validIdxs.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
      } else if (i === 0) {
        let validIdxs = [];
        if (reversePushFlags.grapeLine === 'top') {
          validIdxs = [4, 6, 9, 11, 14, 16, 19, 0];
        } else {
          validIdxs = [2, 4, 7, 9, 12, 14, 17, 19];
        }
        idx = validIdxs.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
      }
    } else {
      if (i === 0) {
        const validIdxs = [3, 5, 8, 10, 13, 17, 20];
        idx = validIdxs.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
      } else if (i === 1) {
        const validIdxs = [2, 6, 10, 14, 18];
        idx = validIdxs.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
      } else if (i === 2) {
        const validIdxs = [0, 5, 9, 13, 17];
        idx = validIdxs.reduce((prev, curr) => Math.abs(curr - idx) < Math.abs(prev - idx) ? curr : prev);
      }
    }

  } else {
    if (stopOrder.length === 1 && stopOrder[0] === 2) {
      if (idx === 1) idx = (idx + 1) % REELS[2].length;
    }

    if(i===0){
      if (round.isConsecutiveCherry) {
        idx = Math.random() < 0.5 ? 6 : 15;
      } else {
        while(
          REELS[0][idx]==='cherry' ||
          REELS[0][(idx-1+REELS[0].length)%REELS[0].length]==='cherry' ||
          REELS[0][(idx+1)%REELS[0].length]==='cherry'
        ) {
          idx = (idx + 1) % REELS[0].length;
        }
      }
    }

    if(i===1){
      if (round.isConsecutiveCherry) {
        idx = pick([2, 6, 10, 14, 18]);
      } else {
        while(
          REELS[1][idx]==='cherry' ||
          REELS[1][(idx-1+REELS[1].length)%REELS[1].length]==='cherry' ||
          REELS[1][(idx+1)%REELS[1].length]==='cherry'
        ) {
          idx = (idx + 1) % REELS[1].length;
        }
      }
    }

    let basicShift = 0;
    while((REELS[i][idx]==='seven' || REELS[i][idx]==='bar') && basicShift < 4){
      idx = (idx + 1) % REELS[i].length;
      basicShift++;
    }
  }

  snapToIndex(i,idx);
  r.stopped=true;
  stopBtns[i].disabled=true;

  const stoppedCount = reels.filter(x=>x.stopped).length;

  if (stoppedCount === 3 && !state.bonusActive && !round.bonusReady && !(round && round.bonus)) {
    let res = evalLines();
    let checkAttempts = 0;
    while (
      (res.hitLines.some(l => l.includes('grape')) && !round.grape) ||
      (res.hitLines.some(l => l.includes('bell')) && !round.bell) ||
      res.bonusHit ||
      res.isFakeCombo ||
      res.hasBarThree
    ) {
      idx = (idx + 1) % REELS[i].length;
      snapToIndex(i, idx);
      res = evalLines();
      checkAttempts++;
      if (checkAttempts > 25) break;
    }
  }

  if (reversePushFlags.active && reversePushFlags.isBonus && stopOrder.length === 2 && stopOrder[1] === 1) {
    if (idx === 1) {
      lamp('blue');
      setMsg('★ GOGO!ランプ点灯！右リール下段BAR・中段7から、中リール中段7停止でボーナス2確！ ★');
    }
  }

  if(round.bonus && !round.bonusReady && round.lampTiming!=='lever'){
    const need={start:-1,after1:1,after2:2,after3:3}[round.lampTiming];
    if(stoppedCount===need){
      lamp('blue');
      setMsg('GOGO!点灯。ボーナス成立状態になりました！次ゲームで揃います。');
    }
  }

  if(reels.every(x=>x.stopped)) finishRound();
}

function rowSymbols(i){
  const arr=REELS[i];
  const c=reels[i].centerIndex;
  const len=arr.length;
  return [
    arr[(c-1+len)%len],
    arr[c],
    arr[(c+1)%len]
  ];
}

function getPaylines(){
  const l=rowSymbols(0);
  const m=rowSymbols(1);
  const r=rowSymbols(2);
  return [
    {name:'top', line:[l[0],m[0],r[0]]},
    {name:'mid', line:[l[1],m[1],r[1]]},
    {name:'bottom', line:[l[2],m[2],r[2]]},
    {name:'diagDown', line:[l[0],m[1],r[2]]},
    {name:'diagUp', line:[l[2],m[1],r[0]]}
  ];
}

function evaluateCherry(){
  const paylines=getPaylines();
  const left=rowSymbols(0);
  const result={payout:0,replay:0,cherryKind:null};

  if(left[1]==='cherry'){
    result.payout+=0;
    result.cherryKind='中段チェリー';
    return result;
  }

  const hasLeftCherry = (left[0]==='cherry' || left[2]==='cherry');
  if(!hasLeftCherry) return result;

  const doubleCherryLines = paylines.filter(p => p.line[0]==='cherry' && p.line[1]==='cherry');
  if(doubleCherryLines.length>0){
    result.payout+=2;
    result.cherryKind='連チェリー';
    return result;
  }

  result.payout+=2;
  result.cherryKind='単チェリー';
  return result;
}

function evalLines(){
  const paylines=getPaylines();
  let payout=0, replay=0, bonusHit=null;
  const hitLines=[];
  let isFakeCombo = false;
  let hasBarThree = false;

  for(const p of paylines){
    const key=p.line.join(',');

    if(key==='bar,bar,bar') hasBarThree = true;
    if(key==='bar,seven,bar' || key==='bar,bar,seven' || key==='seven,bar,bar'){
      isFakeCombo = true;
    }

    for(const bp of BONUS_PATTERNS){
      if(key===bp.line.join(',')){
        bonusHit=bp;
        payout+=bp.payout;
        hitLines.push(`${p.name}:${bp.name}`);
      }
    }
    if(key==='grape,grape,grape'){payout+=7; hitLines.push(`${p.name}:grape`)}
    if(key==='pig,pig,pig'){replay+=1; hitLines.push(`${p.name}:replay`)}
    if(key==='bell,bell,bell'){payout+=15; hitLines.push(`${p.name}:bell`)}
  }

  const cherry=evaluateCherry();
  payout+=cherry.payout;
  replay+=cherry.replay;

  return {paylines,payout,replay,bonusHit,cherryKind:cherry.cherryKind,hitLines,isFakeCombo,hasBarThree};
}

function recordBonus(bp,premium){
  state.totalHits++;
  if(bp.type==='BIG') state.bb++;
  else state.rb++;

  state.streak=state.zoneLeft>0?state.streak+1:1;
  state.history.unshift({
    type:bp.type,
    game:state.currentGames,
    premium,
    time:new Date().toLocaleString('ja-JP')
  });
  state.history=state.history.slice(0,20);
  state.zoneLeft=JUGUREN_GAMES;
  if(premium) state.premiumCount++;
}

async function startSpin(){
  if(inSpin)return;
  if(state.credits<BET&&state.replayStock<=0){
    setMsg('クレジット不足です。クレジット+100で補充してください。');
    return;
  }

  stopOrder = [];
  reversePushFlags = { active: false, isBonus: false, grapeLine: 'diag' };

  inSpin=true;
  lit=false;
  state.lastPayout=0;

  if (state.bonusActive) {
    round = {
      bonus:false,
      bonusReady:true,
      premium:state.bonusPremium,
      premiumType:state.bonusPremiumType,
      bonusPattern:state.bonusPattern,
      isMidCherry:false,
      isConsecutiveCherry:false,
      grape:false,
      bell:false
    };
  } else {
    const rawRound = chooseRound();
    if (rawRound.bonus) {
      state.bonusActive = true;
      state.bonusPattern = rawRound.bonusPattern;
      state.bonusPremium = rawRound.premium;
      state.bonusPremiumType = rawRound.premiumType;

      round = {
        bonus:true,
        bonusReady:false,
        premium:rawRound.premium,
        premiumType:rawRound.premiumType,
        lampTiming:rawRound.lampTiming,
        bonusPattern:rawRound.bonusPattern,
        isMidCherry:rawRound.isMidCherry,
        isConsecutiveCherry:rawRound.isConsecutiveCherry,
        grape:false,
        bell:false
      };
    } else {
      round = {
        bonus:false,
        bonusReady:false,
        premium:false,
        premiumType:null,
        lampTiming:null,
        bonusPattern:null,
        isMidCherry:false,
        isConsecutiveCherry:rawRound.isConsecutiveCherry,
        grape:rawRound.grape,
        bell:rawRound.bell
      };
    }
  }

  if(state.replayStock>0){
    state.replayStock--;
    setMsg('リプレイ消化で今回はクレジットを使わずに回します。');
  }else{
    state.credits-=BET;
    state.coinDiff-=BET;
  }

  state.currentGames++;
  state.totalGames++;
  if(state.zoneLeft>0) state.zoneLeft--;
  state.graph.push(state.coinDiff);
  state.graph=state.graph.slice(-120);

  updateUI();
  stopBtns.forEach(b=>b.disabled=false);

  if (round.bonusReady) {
    if (round.premium) {
      lamp(getPremiumLampMode(round.premiumType));
    } else {
      lamp('blue');
    }
  } else {
    lamp('off');
  }

  if (round.bonus && !round.bonusReady && round.lampTiming === 'lever') {
    if (round.premium) {
      await premiumPrelude();
    } else {
      lamp('blue');
      setMsg('GOGO!点灯！レバーONでランプが光りました！次ゲームでボーナスが揃います。');
    }
  }

  startAll();

  if (!state.bonusActive) {
    setMsg(state.zoneLeft>0 ? `ジャグ連中 1/${JUGUREN_DENOM}。STOPを押して止めてください。` : `通常時 1/${NORMAL_DENOM}。STOPを押して止めてください。`);
  } else if (!round.bonusReady) {
    setMsg('STOPを押して止めてください。');
  } else {
    setMsg('GOGO!ランプ点灯中！ボーナス図柄（7やBAR）を狙ってください！');
  }
}

function finishRound(){
  const res=evalLines();

  if(round.bonus && !round.bonusReady && round.lampTiming==='after3' && !round.premium){
    lamp('blue');
  }

  const isMidCherryReach =
    round &&
    round.isMidCherry &&
    res.cherryKind === '中段チェリー' &&
    res.hasBarThree;

  if ((res.hasBarThree || res.isFakeCombo || isMidCherryReach) && (state.bonusActive || (round && round.bonus))) {
    if (round && round.premium) {
      lamp(getPremiumLampMode(round.premiumType));
    } else {
      lamp('blue');
    }

    state.bonusActive = true;

    let msg = '★ リーチ目降臨！GOGO!ランプ点灯！次ゲームで777か77BARを狙ってください！';

    if (isMidCherryReach) {
      msg = '🍒 中段チェリー + 上段BAR揃い！内部当選時専用演出です。GOGO!ランプ点灯、次ゲームでボーナスを狙ってください！';
    } else if (res.isFakeCombo) {
      msg = '★ リーチ目（ズレ目）降臨！ランプ点灯！次ゲームでボーナスを狙ってください！';
    }

    setMsg(msg);

    if (res.payout > 0) {
      state.credits += res.payout;
      state.coinDiff += res.payout;
      state.lastPayout = res.payout;
    }

    inSpin = false;
    saveState();
    updateUI();
    return;
  }

  if(res.bonusHit && (round.bonusReady || state.bonusActive)){
    const premium = round.premium && res.bonusHit.type==='BIG';
    recordBonus(res.bonusHit,premium);

    state.credits+=res.bonusHit.payout;
    state.coinDiff+=res.bonusHit.payout;
    state.lastPayout=res.bonusHit.payout;
    state.graph.push(state.coinDiff);
    state.graph=state.graph.slice(-120);

    state.bonusActive = false;
    state.bonusPattern = null;
    state.bonusPremium = false;
    state.bonusPremiumType = null;
    lamp('off');

    let bonusMsg = `${res.bonusHit.type==='BIG'?'🎉 BIG':'✨ REG'}確定！ ${res.bonusHit.payout}枚獲得。10Gのジャグ連チャンスへ！`;
    if (!round.bonusReady) {
      bonusMsg = `✨告知前に自力で揃えた！生当たり！ ${bonusMsg}`;
    }
    setMsg(bonusMsg);

  }else{
    if(res.replay>0) state.replayStock+=res.replay;

    if(res.payout>0){
      state.credits+=res.payout;
      state.coinDiff+=res.payout;
      state.lastPayout=res.payout;
      state.graph.push(state.coinDiff);
      state.graph=state.graph.slice(-120);
    }

    if(round.bonus && !round.bonusReady){
      if(round.isConsecutiveCherry){
        setMsg('🍒連チェリー停止！2%の確率を潜り抜ければ第3停止後にペカる…！？');
      } else {
        setMsg('GOGO!ランプ点灯！ボーナスが成立しました！次の回転でボーナス図柄を狙ってください！');
      }
    }else if(state.bonusActive && round.bonusReady){
      setMsg('ボーナスを引き込めませんでした！ランプは点灯中ですので、次ゲームこそボーナス（7やBAR）を狙ってください！');
    }else{
      if (res.hitLines.some(l => l.includes('bell'))) {
        setMsg('🔔 ベル揃い！ 15枚獲得！大満足の役です。');
      } else if(res.cherryKind==='連チェリー'){
        setMsg('連チェリー成立！ 2枚獲得。(2%のランプ点灯抽選は漏れました)');
      }else if(res.cherryKind==='中段チェリー'){
        setMsg('中段チェリー成立！');
      }else if(res.replay>0&&res.payout>0){
        setMsg(`${res.cherryKind?res.cherryKind+' / ':''}ブドウとリプレイが揃いました。`);
      }else if(res.replay>0){
        setMsg('リプレイ！次ゲームはクレジットを消費しません。');
      }else if(res.payout>0){
        setMsg(`${res.cherryKind?res.cherryKind+' / ':''}小役揃い！ ${res.payout}枚獲得。`);
      }else if(res.cherryKind){
        setMsg(`${res.cherryKind}！ ${res.payout}枚獲得。`);
      }else{
        setMsg(state.zoneLeft>0 ? 'ハズレ (ジャグ連中)' : 'ハズレ');
      }
    }
  }

  inSpin=false;
  saveState();
  updateUI();
}

/* --- イベントリスナー --- */
spinBtn.addEventListener('click', startSpin);
stopBtns.forEach((b, i) => b.addEventListener('click', () => stopReel(i)));

document.getElementById('addCreditBtn').addEventListener('click', () => {
  state.credits += 100;
  updateUI();
  setMsg('クレジットを100追加しました。');
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('プレイデータを本当にリセットしますか？')){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});

/* --- 初期化 --- */
initReels();
updateUI();
lamp('off');
</script>
